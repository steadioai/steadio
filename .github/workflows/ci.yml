name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elevation/shared build
      - run: pnpm --filter @elevation/proxy typecheck
      - run: pnpm --filter @elevation/cost-engine typecheck
      - run: pnpm --filter @elevation/dashboard typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elevation/shared build
      - run: pnpm --filter @elevation/proxy test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elevation/shared build
      - run: pnpm --filter @elevation/proxy build
      - run: pnpm --filter @elevation/cost-engine build
      - run: pnpm --filter @elevation/dashboard build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build proxy image
        run: docker build -f packages/proxy/Dockerfile -t elevation-proxy:ci .
      - name: Build cost-engine image
        run: docker build -f packages/cost-engine/Dockerfile -t elevation-cost-engine:ci .
      - name: Build dashboard image
        run: docker build -f packages/dashboard/Dockerfile -t elevation-dashboard:ci .

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Run integration test suite
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            up \
            --build \
            --abort-on-container-exit \
            --exit-code-from test-runner
      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            logs
      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, test, build]
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy docker-compose stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/elevation && git pull && docker compose pull && docker compose up -d --remove-orphans"
          rm -f /tmp/deploy_key
