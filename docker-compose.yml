version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: steadio
      POSTGRES_USER: steadio
      POSTGRES_PASSWORD: steadio_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steadio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      REDIS_URL: redis://redis:6379
      COST_ENGINE_URL: http://cost-engine:3002
      JWT_SECRET: change-in-production
    depends_on:
      redis:
        condition: service_healthy
      cost-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cost-engine:
    build:
      context: .
      dockerfile: packages/cost-engine/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: postgresql://steadio:steadio_dev@db:5432/steadio
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - cost-engine

  # Synthetic traffic generator — only starts under the "demo" profile.
  # Posts a cost event every 5 seconds so the live feed stays active.
  demo-seeder:
    image: alpine:3.20
    command: sh -c "apk add --no-cache curl >/dev/null 2>&1 && sh /demo-traffic.sh"
    volumes:
      - ./scripts/demo-traffic.sh:/demo-traffic.sh:ro
    environment:
      COST_ENGINE_URL: http://cost-engine:3002
      INTERVAL: "5"
    depends_on:
      cost-engine:
        condition: service_healthy
    restart: unless-stopped
    profiles: [demo]

volumes:
  postgres_data:
